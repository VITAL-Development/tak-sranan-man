name: Validate content contract

on:
  pull_request:
  workflow_dispatch:

jobs:
  fetch-rarelang-server:
    name: fetch rarelang-server tooling
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.resolve.outputs.cache-key }}
    steps:
      # rarelang-server is private, so this needs an authenticated clone —
      # RARELANG_SERVER_TOKEN is a PAT scoped to read-only access on that one
      # repo. Resolve `main`'s current commit first (a single `ls-remote`
      # round-trip, not a clone) so the cache key below only changes when
      # rarelang-server's `main` actually moves — most runs hit cache and
      # skip the clone entirely, and every other job in this workflow
      # restores the same cache instead of cloning again itself, so
      # rarelang-server is fetched at most once per commit, not once per job.
      - name: Resolve rarelang-server main SHA
        id: resolve
        env:
          RARELANG_SERVER_TOKEN: ${{ secrets.RARELANG_SERVER_TOKEN }}
        run: |
          sha=$(git ls-remote "https://x-access-token:${RARELANG_SERVER_TOKEN}@github.com/VITAL-Development/rarelang-server.git" refs/heads/main | cut -f1)
          echo "cache-key=rarelang-server-tooling-${sha}" >> "$GITHUB_OUTPUT"

      - name: Cache rarelang-server tooling
        id: cache
        uses: actions/cache@v4
        with:
          path: rarelang-server-tooling
          key: ${{ steps.resolve.outputs.cache-key }}

      - name: Clone rarelang-server (cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          RARELANG_SERVER_TOKEN: ${{ secrets.RARELANG_SERVER_TOKEN }}
        run: git clone --depth 1 "https://x-access-token:${RARELANG_SERVER_TOKEN}@github.com/VITAL-Development/rarelang-server.git" rarelang-server-tooling

  validate-content:
    name: validate-content (rarelang-server)
    needs: fetch-rarelang-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Restore-only: fetch-rarelang-server already populated this exact key
      # (it ran first, via `needs:`), so this is a same-run cache hit — no
      # network fetch of rarelang-server here at all.
      - name: Restore rarelang-server tooling
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Checks this repo's content/sranantongo + settings/sranantongo
      # against the "Content repository contract" in rarelang-server's
      # docs/api-contract.md: required fields/types plus referential
      # integrity of every id-based cross-reference. Tracks rarelang-server's
      # `main` for now since the validator isn't part of a released
      # rarelang-server tag yet; once it ships in one, switch this to that
      # tag the same way deployments pin content tags — a moving `main` ref
      # is only acceptable here because it's fetching tooling, not the
      # content shape being validated.
      - name: Validate content contract
        run: node rarelang-server-tooling/scripts/validate-content.mjs .

  contracts-discovery:
    name: contracts-discovery (deterministic)
    needs: fetch-rarelang-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore rarelang-server tooling
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Deterministic half of "dynamically discover new/changed contracts"
      # (rarelang-server#53, this repo's #13): a plain sha256 diff between
      # rarelang-server's current contract docs and the hashes we last
      # reviewed (contracts.lock.json). No LLM needed to notice a contract
      # doc changed — only reviewing *what* changed is a human/agentic call.
      - name: Diff upstream contracts against contracts.lock.json
        run: |
          node rarelang-server-tooling/scripts/contracts-manifest.mjs > /tmp/upstream-manifest.json
          node -e '
            const fs = require("node:fs");
            const upstream = JSON.parse(fs.readFileSync("/tmp/upstream-manifest.json", "utf-8"));
            const lock = JSON.parse(fs.readFileSync("contracts.lock.json", "utf-8"));
            const docs = Object.keys(upstream);
            const drift = docs.filter((doc) => lock[doc]?.hash !== upstream[doc].hash);
            if (drift.length > 0) {
              console.error("Upstream rarelang-server contract doc(s) changed since contracts.lock.json was last reviewed:");
              for (const doc of drift) {
                const lockedVersion = lock[doc]?.version ?? "(missing)";
                const lockedHash = lock[doc]?.hash ?? "(missing)";
                console.error(`  ${doc}: locked=${lockedVersion} (${lockedHash}) upstream=${upstream[doc].version} (${upstream[doc].hash})`);
              }
              console.error("\nReview the change at https://github.com/VITAL-Development/rarelang-server/blob/main/" + drift[0] + ", then update contracts.lock.json to match.");
              process.exit(1);
            }
            console.log("contracts.lock.json is up to date with rarelang-server main.");
          '

  advisory-contract-review:
    name: advisory-contract-review (agentic, non-blocking)
    needs: fetch-rarelang-server
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    # The `secrets` context isn't available in step `if:` conditionals (only
    # in `env:`/`with:`) — computing the boolean here first and checking
    # `env.HAS_CLAUDE_TOKEN` below is the standard workaround.
    env:
      HAS_CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cost control: only run the agent when a PR actually touches content
      # or the lesson plan — most PRs (CI/docs/tooling) don't, and should
      # cost zero tokens. No full-repo scan either way.
      - name: List changed content/lesson-plan files
        id: changed
        run: |
          files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'content/sranantongo/**' 'docs/lesson-plan.md')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore rarelang-server tooling
        if: steps.changed.outputs.any == 'true'
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Advisory-only half of the Option C fork (rarelang-server#53, #13):
      # the two contracts here are prose/judgment calls that aren't
      # schema-shaped — CEFR-tier correctness of a unit's `cefrLevel`, and
      # the A2-readability ceiling on English authoring text — so they're
      # left to a single, tightly-scoped agentic pass instead of the
      # deterministic validate-content job. Cost controls: gated to run only
      # when content changed (above), reads only the changed files listed
      # above plus the two contract docs (no repo-wide search), single
      # attempt (no retry loop), findings below 70% confidence are not
      # reported, and the job never fails the check — it's advisory, posted
      # as a PR comment only. CLAUDE_CODE_OAUTH_TOKEN is present in this
      # repo's secrets (tak-sranan-man#13's prerequisite is resolved); the
      # HAS_CLAUDE_TOKEN guard is left in place as a defensive no-op rather
      # than a hard failure if it's ever removed.
      - name: Run Claude Code advisory review
        id: claude_advisory
        if: steps.changed.outputs.any == 'true' && env.HAS_CLAUDE_TOKEN == 'true'
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are doing a single-pass advisory review. Do not search the repository
            or use any tool beyond reading the specific files listed below — this is a
            cost-bounded check, not an open-ended audit.

            Read only:
            - The changed files from this PR: ${{ steps.changed.outputs.files }}
            - rarelang-server-tooling/docs/contracts/lesson-plan-authoring-contract.md (CEFR tier rules, cefrLevel field)
            - rarelang-server-tooling/docs/contracts/source-language-authoring-contract.md (A2 ceiling on English authoring text)

            Evaluate the changed files against those two contracts only:
            1. If a unit sets `cefrLevel`, does its actual vocab/grammar difficulty plausibly
               match that CEFR tier (per the tier table in the lesson-plan contract)?
            2. Is English authoring text (unit/lesson descriptions, notes, exercise prompts —
               not the target-language content itself) written at CEFR A2 level or simpler
               (short sentences, common vocabulary, minimal subordination)?

            For each candidate issue, assign yourself a confidence 0-100. Only report
            findings with confidence >= 70.

            Post exactly ONE PR comment either way, so a reader can tell the review actually
            ran instead of wondering why nothing showed up:
            - If you have findings at or above that bar, list each with: the file, a
              one-sentence description, your confidence, and which contract it concerns.
            - Otherwise (no qualifying findings, or none of the changed files are relevant
              to these two contracts), post a single short line saying so, e.g. "Advisory
              contract review: no issues found above the 70% confidence bar."
            Make clear in the comment that this is an advisory, non-blocking review.
            Post it by running `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
            — that's the only Bash command you're allowed to run.
          claude_args: "--max-turns 15 --allowed-tools \"Read\" \"Bash(gh pr comment:*)\""

      # Fallback for when the step above ran (condition was true) but never
      # got as far as posting a comment — e.g. GitHub's OIDC token exchange
      # for claude-code-action refuses to authenticate when a PR's workflow
      # file differs from the version committed on the default branch (a
      # guard against a PR editing its own workflow to exfiltrate
      # CLAUDE_CODE_OAUTH_TOKEN), which silently no-ops the step on any PR
      # that touches this very file. Without this, that looked to a reader
      # like the check had silently failed. `execution_file` is only set once
      # Claude actually runs (see anthropics/claude-code-action's run.ts), so
      # its absence — combined with the step not failing outright — is the
      # signal something upstream of the review itself went wrong.
      - name: Report advisory review if it didn't post
        if: |
          always() &&
          steps.changed.outputs.any == 'true' && env.HAS_CLAUDE_TOKEN == 'true' &&
          (steps.claude_advisory.outcome == 'failure' || steps.claude_advisory.outputs.execution_file == '')
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ steps.claude_advisory.outcome }}
        run: |
          if [ "$OUTCOME" = "failure" ]; then
            body="**Advisory contract review didn't post a comment.**"$'\n\n'"The \`Run Claude Code advisory review\` step failed outright (non-blocking — this doesn't affect merge status). See the [workflow run]($RUN_URL) for the error."
          else
            body="**Advisory contract review didn't post a comment.**"$'\n\n'"The step completed without producing one, most likely because this PR modifies \`.github/workflows/validate-content.yml\` itself: GitHub's OIDC token exchange for \`claude-code-action\` refuses to authenticate when a PR's workflow file differs from the version committed on the default branch (\`main\`) — a guard against a PR altering its own workflow to exfiltrate \`CLAUDE_CODE_OAUTH_TOKEN\`. This is expected and resolves once this workflow file on \`main\` matches; it does not indicate a problem with this PR's content changes. See the [workflow run]($RUN_URL) for details."
          fi
          gh pr comment "${{ github.event.pull_request.number }}" --body "$body"
